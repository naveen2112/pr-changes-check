name: Update Documentation After Merge (cross-repo)

on:
  pull_request:
    types: [closed]

concurrency:
  group: update-docs-${{ github.base_ref }}
  cancel-in-progress: false

env:
  # The separate repo that holds the documentation.
  DOCS_REPO: naveen2112/docs-repo
  DOCS_REPO_DEFAULT_BRANCH: main
  # Paths *inside the docs repo* to keep in sync, comma-separated.
  DOC_PATHS: "docs.md"
  # Bedrock region + model. Haiku 4.5 is the cheapest current-gen model;
  # swap BEDROCK_MODEL_ID for a Sonnet inference profile if you need
  # higher-quality doc rewrites and are OK paying more per run.
  AWS_REGION: us-east-1
  BEDROCK_MODEL_ID: global.anthropic.claude-haiku-4-5-20251001-v1:0


jobs:
  update-docs:
    if: >
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.body, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      # no id-token permission needed -- we're using static access keys, not OIDC

    steps:
      # 1. Checkout the code repo at the merge commit so we can diff what just landed.
      - name: Checkout code repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          repository: ${{ github.event.pull_request.base.repo.full_name }}
          fetch-depth: 0

      - name: Compute merged PR diff
        run: |
          MERGE_SHA=${{ github.event.pull_request.merge_commit_sha }}
          # Diff the merge commit against its first parent (the base branch
          # tip before the merge) — this is the net change the PR introduced.
          git diff ${MERGE_SHA}^1 ${MERGE_SHA} -- . ':(exclude)*.lock' > ${{ github.workspace }}/pr_diff.txt
          echo "Diff size: $(wc -l < pr_diff.txt) lines"

      # 2. Token scoped only to the docs repo.
      #    Create a fine-grained personal access token (Settings -> Developer
      #    settings -> Fine-grained tokens), scoped to ONLY the docs repo, with
      #    repository permissions: Contents: Read and write, Pull requests:
      #    Read and write. Store it as a secret named DOCS_REPO_PAT (repo or
      #    org level, shared across module repos if you have several).
      #    Fine-grained PATs support an expiration date (max 1 year) -- set a
      #    calendar reminder to rotate it before it lapses.

      # 3. Checkout the docs repo into its own subfolder using that token.
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DOCS_REPO }}
          ref: ${{ env.DOCS_REPO_DEFAULT_BRANCH }}
          token: ${{ secrets.DOCS_REPO_PAT }}
          path: docs-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic[bedrock] boto3

      # 4. AWS credentials via a static access key/secret pair instead of OIDC.
      #    Create an IAM user with ONLY bedrock:InvokeModel on the specific
      #    Haiku model/inference-profile ARN (no broader permissions), generate
      #    an access key for it, and store the two values as secrets named
      #    AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY. Because these are
      #    long-lived, rotate them on a schedule (e.g. every 90 days) and make
      #    sure they're never printed in logs.
      - name: Configure AWS credentials (static access key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ask Claude (via Bedrock) to update documentation
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          BEDROCK_MODEL_ID: ${{ env.BEDROCK_MODEL_ID }}
          DOC_PATHS: ${{ env.DOC_PATHS }}
          DOC_ROOT: docs-repo
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: python code-repo-scripts/update_docs.py
        # ^ point this at wherever you keep the script; see note below.

      # 5. Open a PR in the docs repo with whatever Claude changed.
      #    (No-op / no PR created if nothing changed.)
      - name: Open PR in docs repo
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DOCS_REPO_PAT }}
          path: docs-repo
          commit-message: "docs: sync with ${{ github.repository }}#${{ github.event.pull_request.number }} (merged)"
          branch: docs-bot/sync-pr-${{ github.event.pull_request.number }}
          title: "docs: update for ${{ github.repository }}#${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
          body: |
            Auto-generated documentation update triggered by the merge of
            ${{ github.event.pull_request.html_url }}.

            This was written by an LLM based on the merged PR's diff and is
            being auto-merged. Check the docs-repo history if something looks off.

      # 6. Auto-merge the docs PR immediately (no human review gate).
      #    Only runs if step 5 actually created a PR (i.e. Claude changed something).
      - name: Auto-merge docs PR
        if: steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_PAT }}
        run: |
          gh pr merge ${{ steps.create_pr.outputs.pull-request-number }} \
            --repo ${{ env.DOCS_REPO }} \
            --squash \
            --delete-branch
